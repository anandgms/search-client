<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Solr Admin - Query</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #f3f3f3;
        }

        .header {
            background: #2f5b8f;
            color: white;
            padding: 10px 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .container {
            display: flex;
            height: calc(100vh - 40px);
        }

        .sidebar {
            width: 300px;
            background: #ffffff;
            border-right: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
        }

        .content {
            flex: 1;
            padding: 10px;
            overflow: auto;
        }

        .panel {
            background: white;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        .panel-header {
            background: #e6e6e6;
            padding: 6px 10px;
            font-weight: bold;
            border-bottom: 1px solid #ccc;
        }

        .panel-body {
            padding: 10px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-top: 8px;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 4px;
            font-size: 13px;
            margin-top: 2px;
            box-sizing: border-box;
        }

        textarea {
            font-family: monospace;
            height: 300px;
        }

        .btn {
            margin-top: 10px;
            padding: 6px 12px;
            background: #2f5b8f;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1e3f66;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #ccc;
            margin-bottom: 5px;
        }

        .tab {
            padding: 6px 12px;
            cursor: pointer;
            background: #e6e6e6;
            margin-right: 2px;
        }

        .tab.active {
            background: white;
            border: 1px solid #ccc;
            border-bottom: none;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 5px;
        }

        th {
            background: #f0f0f0;
        }

    </style>

</head>
<body>

<div class="header">
    Solr Admin — Query
</div>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="sidebar">

        <div class="panel">
            <div class="panel-header">Query Parameters</div>

            <div class="panel-body">

                <form th:action="@{/admin/query}" method="post">

                    <label>Query (q)</label>
                    <input type="text" name="q"
                           th:value="${query.q ?: '*:*'}"/>

                    <label>Filter Query (fq)</label>
                    <input type="text" name="fq"
                           th:value="${query.fq}"/>

                    <label>Start</label>
                    <input type="number" name="start"
                           th:value="${query.start ?: 0}"/>

                    <label>Rows</label>
                    <input type="number" name="rows"
                           th:value="${query.rows ?: 10}"/>

                    <label>Sort</label>
                    <input type="text" name="sort"
                           th:value="${query.sort}"/>

                    <label>Query Parser (defType)</label>
                    <select name="defType">
                        <option value="lucene"
                                th:selected="${query.defType == 'lucene'}">
                            lucene
                        </option>

                        <option value="edismax"
                                th:selected="${query.defType == 'edismax'}">
                            edismax
                        </option>
                    </select>

                    <button class="btn" type="submit">
                        Execute Query
                    </button>

                </form>

            </div>

        </div>

    </div>


    <!-- RIGHT PANEL -->
    <div class="content">

        <div class="panel">

            <div class="panel-header">
                Results
            </div>

            <div class="panel-body">

                <div class="tabs">

                    <div class="tab active"
                         onclick="showTab('response')">
                        Response
                    </div>

                    <div class="tab"
                         onclick="showTab('json')">
                        JSON
                    </div>

                    <div class="tab"
                         onclick="showTab('debug')">
                        Debug
                    </div>

                </div>


                <!-- RESPONSE TAB -->
                <div id="response"
                     class="tab-content active">

                    <table th:if="${response != null}">
                        <thead>
                        <tr>
                            <th th:each="field : ${response.fields}"
                                th:text="${field}">
                            </th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="doc : ${response.docs}">

                            <td th:each="field : ${response.fields}"
                                th:text="${doc[field]}">
                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>


                <!-- JSON TAB -->
                <div id="json"
                     class="tab-content">

                    <textarea readonly
                              th:text="${responseJson}">
                    </textarea>

                </div>


                <!-- DEBUG TAB -->
                <div id="debug"
                     class="tab-content">

                    <textarea readonly
                              th:text="${debugJson}">
                    </textarea>

                </div>

            </div>

        </div>

    </div>

</div>


<script>

    function showTab(name) {

        document.querySelectorAll(".tab")
            .forEach(t => t.classList.remove("active"));

        document.querySelectorAll(".tab-content")
            .forEach(t => t.classList.remove("active"));

        event.target.classList.add("active");

        document.getElementById(name)
            .classList.add("active");
    }

</script>


</body>
</html>
